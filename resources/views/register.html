<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 300px; }
        h2 { margin-top: 0; color: #333; }
        input { width: 100%; padding: 8px; margin: 6px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 8px; }
        button:hover { background: #4338ca; }
        p { color: red; font-size: 14px; }
        a { color: #4f46e5; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Register</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="password_confirmation" placeholder="Confirm Password">
        <button onclick="register()">Register</button>
        <p id="msg"></p>
        <a href="login.html">Already have an account? Login</a>
    </div>
    <script>
        async function register() {
            const res = await fetch('http://localhost:8000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    password_confirmation: document.getElementById('password_confirmation').value,
                })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                window.location.href = 'categories.html';
            } else {
                const errors = data.errors;
                if (errors) {
                    const first = Object.values(errors)[0][0];
                    document.getElementById('msg').textContent = first;
                } else {
                    document.getElementById('msg').textContent = data.message ?? 'Registration failed';
                }
            }
        }
    </script>
</body>
</html>
