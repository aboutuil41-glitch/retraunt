<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Categories</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        nav { background: #4f46e5; padding: 12px 24px; color: white; }
        nav a { color: white; margin-right: 16px; text-decoration: none; }
        nav button { background: transparent; border: 1px solid white; color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
        .container { max-width: 600px; margin: 32px auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 70%; }
        .add-btn { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 8px; }
        .add-btn:hover { background: #4338ca; }
        ul { list-style: none; padding: 0; margin-top: 16px; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #ef4444; color: white; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; }
        .del-btn:hover { background: #dc2626; }
    </style>
</head>
<body>
    <nav>
        <a href="categories.html">Categories</a>
        <a href="dishes.html">Dishes</a>
        <button onclick="logout()">Logout</button>
    </nav>
    <div class="container">
        <h2>Categories</h2>
        <input type="text" id="name" placeholder="Category name">
        <button class="add-btn" onclick="createCategory()">Add</button>
        <ul id="list"></ul>
    </div>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

        async function load() {
            const res = await fetch('http://localhost:8000/api/categories', { headers });
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(c => {
                list.innerHTML += `<li><span>${c.name} <small style="color:#888">(${c.dishes.length} dishes)</small></span>
                    <button class="del-btn" onclick="deleteCategory(${c.id})">Delete</button></li>`;
            });
        }

        async function createCategory() {
            await fetch('http://localhost:8000/api/categories', {
                method: 'POST', headers,
                body: JSON.stringify({ name: document.getElementById('name').value })
            });
            document.getElementById('name').value = '';
            load();
        }

        async function deleteCategory(id) {
            await fetch('http://localhost:8000/api/categories/' + id, { method: 'DELETE', headers });
            load();
        }

        async function logout() {
            await fetch('http://localhost:8000/api/logout', { method: 'POST', headers });
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        load();
    </script>
</body>
</html>
